<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستكشف الأصول العالمية | Advanced Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- ربط ملف التصميم -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- الخلفية المتحركة -->
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="glass-panel">
        <header>
            <h1>الخوارزمية الجينية الذكية</h1>
            <p>قم بسحب وإفلات صورتك هنا، أو اضغط للاختيار، لتبدأ عملية التحليل المورفولوجي المتقدمة.</p>
        </header>

        <!-- منطقة الرفع التفاعلية -->
        <section class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" hidden>
            <div class="upload-content" id="uploadContent">
                <div class="icon-pulse">🧬</div>
                <h3>اسحب الصورة وأفلتها هنا</h3>
                <span class="file-limits">الحد الأقصى 5MB (JPG, PNG)</span>
            </div>
            <div class="preview-container" id="previewContainer">
                <img id="previewImage" alt="الصورة المرفوعة">
                <div class="cyber-scanner" id="cyberScanner"></div>
            </div>
        </section>

        <!-- شريط الحالة والعمليات -->
        <div class="status-box" id="statusBox">
            <div class="spinner" id="loadingSpinner"></div>
            <span id="statusText">في انتظار الصورة...</span>
        </div>

        <!-- صندوق النتائج -->
        <section class="results-box" id="resultsBox">
            <h3 class="results-header">🌍 التقرير الجيني التقديري</h3>
            <div id="barsContainer" class="bars-container"></div>
            
            <button class="btn-reset" id="resetBtn">🔄 تحليل صورة أخرى</button>
        </section>
    </main>

    <!-- ربط ملف البرمجة -->
    <script src="script.js"></script>
</body>
</html>
